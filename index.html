    <title>MMstack — Digital Solutions from Cameroon</title>
    <script>
      // Anti-FOUC : posé avant le premier rendu React. Préférence mémorisée en priorité,
      // sinon préférence système (prefers-color-scheme), sinon sombre par défaut.
      (function () {
        try {
          var stored = localStorage.getItem('mmstack-theme');
          var isDark = stored === 'light'
            ? false
            : stored === 'dark'
              ? true
              : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
